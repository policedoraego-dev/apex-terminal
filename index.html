<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>APEX COMMANDER V7.0</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; width: 400px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 15px; background: #020617; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 18px; margin-bottom: 20px; text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-kabu { background: #22c55e; }
        .btn-tv { background: #3b82f6; }
        .btn-yaho { background: #6366f1; }
    </style>
</head>
<body>
    <div class="card">
        <h2>APEX COMMANDER</h2>
        <input type="text" id="ticker" placeholder="銘柄コードを入力" onkeydown="if(event.key==='Enter') go('kabu')">
        <div class="btn-group">
            <button class="btn btn-kabu" onclick="go('kabu')">財務分析 (株探)</button>
            <button class="btn btn-tv" onclick="go('tv')">チャート (TradingView)</button>
            <button class="btn btn-yaho" onclick="go('yaho')">詳細情報 (YAHOO)</button>
        </div>
    </div>
    <script>
        function go(type) {
            const t = document.getElementById('ticker').value.trim().toUpperCase();
            if (!t) return;
            const isJP = /^\d{4}$/.test(t);
            let url = '';
            if (type === 'kabu') url = isJP ? `https://kabutan.jp/stock/?code=${t}` : `https://us.kabutan.jp/stocks/${t}`;
            else if (type === 'tv') url = `https://jp.tradingview.com/chart/?symbol=${isJP ? 'TSE:'+t : t}`;
            else if (type === 'yaho') url = isJP ? `https://finance.yahoo.co.jp/quote/${t}.T` : `https://finance.yahoo.com/quote/${t}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
